apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-web
  namespace: s4
  labels:
    app: training-web
spec:
  replicas: 2

  selector:
    matchLabels:
      app: training-web

  template:
    metadata:
      labels:
        app: training-web

    spec:
      containers:

      - name: nginx

        image: nginx:stable

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        envFrom:

        - configMapRef:
            name: training-config

        - secretRef:
            name: training-secret

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

